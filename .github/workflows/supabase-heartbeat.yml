name: Supabase Heartbeat
on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:
jobs:
  heartbeat:
    name: Ping Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping production Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SB_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SB_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SB_KEY }}")
          echo "Production Supabase status: $STATUS"
      - name: Ping staging Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SB_URL_STAGING }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SB_KEY_STAGING }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SB_KEY_STAGING }}")
          echo "Staging Supabase status: $STATUS"
