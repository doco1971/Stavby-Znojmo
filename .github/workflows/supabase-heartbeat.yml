name: Supabase Heartbeat

on:
  schedule:
    - cron: '45 4 * * *'  # 4:45 UTC každý den — probouzí SB před pg_cron emailem (5:00 UTC)
  workflow_dispatch:       # manuální spuštění pro testování

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase PROD
        run: |
          curl -s "${{ secrets.VITE_SB_URL }}/rest/v1/stavby?limit=1" \
            -H "apikey: ${{ secrets.VITE_SB_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SB_KEY }}" \
            -o /dev/null -w "PROD status: %{http_code}\n"

      - name: Ping Supabase STAGING
        run: |
          curl -s "${{ secrets.VITE_SB_URL_STAGING }}/rest/v1/stavby?limit=1" \
            -H "apikey: ${{ secrets.VITE_SB_KEY_STAGING }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SB_KEY_STAGING }}" \
            -o /dev/null -w "STAGING status: %{http_code}\n"
